<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudioKukan - Web Tour</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; font-family: sans-serif; }
        /* スワイプによる画面スクロールを防止し、3Dキャンバスの操作に専念させる */
        #canvas-container { width: 100vw; height: 100vh; touch-action: none; }
        
        /* Webツアー用のクリーンなUI */
        #tour-overlay {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 20, 30, 0.95); color: white; 
            padding: 25px; border-radius: 8px; border: 1px solid #ffaa00;
            width: 650px; max-width: 90vw; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
            display: flex; flex-direction: column; gap: 15px; pointer-events: auto;
            /* モバイル向けの調整 */
            box-sizing: border-box;
        }
        
        #tour-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ffaa00; padding-bottom: 10px; }
        #tour-title { font-size: 20px; font-weight: bold; color: #ffdd66; margin: 0;}
        #tour-counter { font-size: 14px; color: #aaa; font-family: monospace;}
        
        #tour-desc { font-size: 16px; line-height: 1.6; white-space: pre-wrap; color: #eee; min-height: 80px; overflow-y: auto; max-height: 30vh;}
        
        #tour-controls { display: flex; justify-content: space-between; gap: 10px; margin-top: 10px;}
        .tour-btn { 
            background: #2255aa; color: white; border: none; padding: 12px 20px; 
            border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.2s;
            /* モバイルでタップしやすいサイズ */
            font-size: 16px;
        }
        .tour-btn:hover { background: #3366cc; }
        .tour-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .kukan-label {
            background: rgba(0, 0, 0, 0.8); color: #fff; border: 1px solid #888;
            padding: 4px 10px; border-radius: 15px; font-size: 13px; font-family: sans-serif;
            white-space: nowrap; pointer-events: none; backdrop-filter: blur(2px); transition: opacity 0.4s;
        }
        .line-label { background: rgba(50, 80, 150, 0.8); border-color: #4488ff; }
        .kukan-label.dimmed, .cross-mark.dimmed { opacity: 0.15; } 

        #help-text { 
            position: absolute; top: 15px; left: 15px; color: #666; font-size: 12px; font-family: monospace; pointer-events: none;
            background: rgba(240, 244, 248, 0.7); padding: 5px; border-radius: 4px;
        }

        /* スマートフォン向けメディアクエリ */
        @media (max-width: 768px) {
            #tour-overlay {
                bottom: 15px;
                padding: 15px;
                width: 95vw;
                gap: 10px;
            }
            #tour-title { font-size: 18px; }
            #tour-desc { font-size: 14px; min-height: 60px; max-height: 25vh;}
            .tour-btn { padding: 10px; font-size: 14px; }
            #help-text { font-size: 10px; top: 10px; left: 10px;}
        }
    </style>
</head>

            { "id": "id_aft9k0yrq", "semantic": { "sourceId": "id_hmwx2q2hm", "targetId": "id_cqfb4y49v", "label": "", "description": "", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": false } },
            { "id": "id_0m7tapich", "semantic": { "sourceId": "id_hmwx2q2hm", "targetId": "id_i0u1mpsrx", "label": "", "description": "", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": false } },
            { "id": "id_pm857fwli", "semantic": { "sourceId": "id_6uurmk4t2", "targetId": "id_a8rieozll", "label": "", "description": "", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": false } },
            { "id": "id_wxx8w5how", "semantic": { "sourceId": "id_i0u1mpsrx", "targetId": "id_a8rieozll", "label": "", "description": "", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": false } },
            { "id": "id_kblouzsyh", "semantic": { "sourceId": "id_a8rieozll", "targetId": "id_cqfb4y49v", "label": "", "description": "", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": false } },
            { "id": "id_cp1pvc1wp", "semantic": { "sourceId": "id_973vzgrdw", "targetId": "id_a8rieozll", "label": "", "description": "", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": false } },
            { "id": "id_wht9hq3fw", "semantic": { "sourceId": "id_sdbmt7sm7", "targetId": "id_i0u1mpsrx", "label": "", "description": "", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": false } },
            { "id": "id_s4eaa3dqi", "semantic": { "sourceId": "id_a8rieozll", "targetId": "id_41trgivge", "label": "", "description": "", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": false } },
            { "id": "id_3ahtxi8tg", "semantic": { "sourceId": "id_hmwx2q2hm", "targetId": "id_a8rieozll", "label": "", "description": "", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": false } },
            { "id": "id_olzvaolq2", "semantic": { "sourceId": "id_835gzapgx", "targetId": "id_6uurmk4t2", "label": "", "description": "アミラーゼはセルロースを分解できない。理由はデンプンと同じように、同じグルコースから出来ていても、デンプンとはグルコースのつながり方が違うためです。", "isCrossedOut": true }, "visual": { "arrowStart": false, "arrowEnd": true } },
            { "id": "id_q372947i9", "semantic": { "sourceId": "id_835gzapgx", "targetId": "id_zqtgfnsyn", "label": "", "description": "アミラーゼはデンプンを分解できます。", "isCrossedOut": false }, "visual": { "arrowStart": false, "arrowEnd": true } }
          ]
        };

        // ツアーのステップ定義
        const tourSteps = [
            {
                title: spaceData.metadata.title,
                desc: spaceData.metadata.description,
                targetId: null 
            },
            {
                title: "1. 分解される対象「デンプン」",
                desc: "アミラーゼが分解する対象です。たくさんの「グルコース（小さな立方体）」が特定の形でつながって土台を形成しています。",
                targetId: "id_zqtgfnsyn" 
            },
            {
                title: "2. 酵素「アミラーゼ」",
                desc: "アミラーゼはデンプンを分解する酵素です。\n矢印が示すように、アミラーゼはデンプンに作用することができます。",
                targetId: "id_q372947i9" 
            },
            {
                title: "3. 別の形「セルロース」",
                desc: "デンプンと同じく「グルコース」からできていますが、つながり方（全体の形）が異なります。",
                targetId: "id_6uurmk4t2" 
            },
            {
                title: "4. アミラーゼとセルロースの関係",
                desc: "アミラーゼはセルロースを分解できません（✖マーク）。\n理由は、同じ材料（グルコース）からできていても「形が違う」からです。",
                targetId: "id_olzvaolq2" 
            },
            {
                title: "結論",
                desc: "「セルロースは（  ）と形が違う。」\n\n空間全体を見渡すと、比較対象は明らかです。\n正解は「デンプン」です。",
                targetId: null 
            }
        ];

        let currentStep = 0;

        // ＝＝＝ Three.js 基本設定 ＝＝＝
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f4f8);
        scene.add(new THREE.GridHelper(50, 50, 0xcccccc, 0xe0e0e0));

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const cssRenderer = new CSS2DRenderer();
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('label-renderer-container').appendChild(cssRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: null, RIGHT: THREE.MOUSE.PAN };
        // タッチ操作の設定（デフォルトで有効ですが明示的に）
        controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const objects = [];
        const linesData = [];

        function isNode(entity) { return entity && entity.kind === 'node'; }
        function isEdge(entity) { return entity && entity.kind === 'edge'; }

        function buildSpace() {
            spaceData.nodes.forEach(nd => {
                let geo;
                if(nd.semantic.type === 'cube' || nd.semantic.type === 'cuboid') geo = new THREE.BoxGeometry(1, 1, 1);
                if(nd.semantic.type === 'sphere') geo = new THREE.SphereGeometry(0.5, 32, 32);
                if(nd.semantic.type === 'cylinder') geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);
                
                const cHex = nd.visual.color || 0x8899aa;
                const mat = new THREE.MeshStandardMaterial({ color: cHex, roughness: 0.8, transparent: true, opacity: 1.0 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(nd.visual.position.x, nd.visual.position.y, nd.visual.position.z);
                mesh.scale.set(nd.visual.scale.x, nd.visual.scale.y, nd.visual.scale.z);
                mesh.kind = 'node'; 
                mesh.userData = { id: nd.id, semantic: nd.semantic, visual: nd.visual, runtime: nd.runtime };
                scene.add(mesh); objects.push(mesh);
            });

            spaceData.edges.forEach(ed => {
                const n1 = objects.find(o => o.userData.id === ed.semantic.sourceId);
                const n2 = objects.find(o => o.userData.id === ed.semantic.targetId);
                if(n1 && n2) {
                    const geo = new THREE.BufferGeometry().setFromPoints([n1.position, n2.position]);
                    const mesh = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x555555, linewidth: 2, transparent: true, opacity: 1.0 }));
                    scene.add(mesh);
                    linesData.push({ 
                        kind: 'edge', id: ed.id, lineMesh: mesh, node1: n1, node2: n2, 
                        hasArrow1: ed.visual.arrowStart, hasArrow2: ed.visual.arrowEnd, arrow1: null, arrow2: null, 
                        isCrossedOut: ed.semantic.isCrossedOut, crossObject: null,
                        labelText: ed.semantic.label, description: ed.semantic.description, labelObject: null 
                    });
                }
            });

            linesData.forEach(ld => { if(ld.hasArrow1) addArrowToLine(ld, 1); if(ld.hasArrow2) addArrowToLine(ld, 2); });
            refreshAllLabels();
        }

        // 矢印の深度テストを元に戻し（隠れるようにし）、少しシャープな見た目に変更
        function addArrowToLine(lineData, targetIndex) {
            const arrowGeo = new THREE.ConeGeometry(0.25, 0.8, 16); 
            arrowGeo.translate(0, -0.4, 0); 
            arrowGeo.rotateX(Math.PI / 2); 
            
            const arrowMesh = new THREE.Mesh(arrowGeo, new THREE.MeshBasicMaterial({ 
                color: 0xff3333, 
                transparent: true, 
                opacity: 1.0 
            })); 
            
            scene.add(arrowMesh);
            if (targetIndex === 1) { lineData.arrow1 = arrowMesh; lineData.hasArrow1 = true; } else { lineData.arrow2 = arrowMesh; lineData.hasArrow2 = true; }
        }

        function refreshAllLabels() {
            [...objects, ...linesData].forEach(entity => {
                const labelText = isNode(entity) ? entity.userData.semantic.label : entity.labelText;
                if (labelText !== "") {
                    const div = document.createElement('div');
                    div.className = isNode(entity) ? 'kukan-label' : 'kukan-label line-label';
                    div.innerText = labelText;
                    entity.labelObject = new CSS2DObject(div);
                    scene.add(entity.labelObject);
                }
                if (isEdge(entity) && entity.isCrossedOut) {
                    const crossGroup = new THREE.Group();
                    const mat = new THREE.MeshBasicMaterial({ color: 0xee4444, depthTest: true, transparent: true, opacity: 1.0 });
                    const geo = new THREE.BoxGeometry(0.8, 0.15, 0.15); 
                    const m1 = new THREE.Mesh(geo, mat); m1.rotation.z = Math.PI / 4;
                    const m2 = new THREE.Mesh(geo, mat); m2.rotation.z = -Math.PI / 4;
                    crossGroup.add(m1); crossGroup.add(m2);
                    entity.crossObject = crossGroup;
                    scene.add(crossGroup);
                }
            });
            updateSpatialRelations();
        }

        function updateSpatialRelations() {
            // 【重要修正】計算前に空間全体の最新座標を強制アップデート
            scene.updateMatrixWorld(true);

            const calcRaycaster = new THREE.Raycaster();
            linesData.forEach(data => {
                const p1 = data.node1.position; const p2 = data.node2.position;
                if (p1.distanceTo(p2) < 0.1) return; 
                const dir = new THREE.Vector3().subVectors(p2, p1).normalize();
                
                // 対象図形だけでなく、その上のグルコース（スタック要素）も含めて表面を計算
                let targets1 = [data.node1];
                if (data.node1.userData.semantic.stackedItems) {
                    data.node1.userData.semantic.stackedItems.forEach(id => {
                        const child = objects.find(o => o.userData.id === id);
                        if (child) targets1.push(child);
                    });
                }
                calcRaycaster.set(p2, dir.clone().negate()); 
                const int1 = calcRaycaster.intersectObjects(targets1, false); 
                const surfaceP1 = int1.length > 0 ? int1[0].point : p1;

                let targets2 = [data.node2];
                if (data.node2.userData.semantic.stackedItems) {
                    data.node2.userData.semantic.stackedItems.forEach(id => {
                        const child = objects.find(o => o.userData.id === id);
                        if (child) targets2.push(child);
                    });
                }
                calcRaycaster.set(p1, dir); 
                const int2 = calcRaycaster.intersectObjects(targets2, false); 
                const surfaceP2 = int2.length > 0 ? int2[0].point : p2;

                const positions = data.lineMesh.geometry.attributes.position.array;
                positions[0] = surfaceP1.x; positions[1] = surfaceP1.y; positions[2] = surfaceP1.z; 
                positions[3] = surfaceP2.x; positions[4] = surfaceP2.y; positions[5] = surfaceP2.z;
                data.lineMesh.geometry.attributes.position.needsUpdate = true;

                if (data.arrow1) { data.arrow1.position.copy(surfaceP1); data.arrow1.lookAt(surfaceP1.clone().sub(dir)); }
                if (data.arrow2) { data.arrow2.position.copy(surfaceP2); data.arrow2.lookAt(surfaceP2.clone().add(dir)); }
                
                const midPoint = new THREE.Vector3().addVectors(surfaceP1, surfaceP2).multiplyScalar(0.5);
                if (data.labelObject) { data.labelObject.position.copy(midPoint); if (data.isCrossedOut) data.labelObject.position.y -= 0.6; }
                if (data.crossObject) { data.crossObject.position.copy(midPoint); }
            });

            objects.forEach(mesh => {
                if (!mesh.labelObject) return;
                const bb = new THREE.Box3().setFromObject(mesh); const center = new THREE.Vector3(); bb.getCenter(center);
                const size = new THREE.Vector3(); bb.getSize(size); const offset = new THREE.Vector3(); const pad = 0.4;
                const pos = mesh.userData.visual.labelPos;
                if (pos === 'top') offset.set(0, size.y / 2 + pad, 0);
                else if (pos === 'right') offset.set(size.x / 2 + pad, 0, 0);
                else if (pos === 'left') offset.set(-size.x / 2 - pad, 0, 0);
                else if (pos === 'front') offset.set(0, 0, size.z / 2 + pad);
                mesh.labelObject.position.copy(center).add(offset);
            });
        }

        function setFocus(targetEntity) {
            const isTargetNode = isNode(targetEntity);
            
            objects.forEach(obj => {
                let isFocus = false;
                if (isTargetNode) {
                    const isConnected = linesData.some(ld => (ld.node1 === targetEntity || ld.node2 === targetEntity) && (ld.node1 === obj || ld.node2 === obj));
                    const isStacked = (obj.userData.semantic.stackedOn === targetEntity.userData.id || targetEntity.userData.semantic.stackedOn === obj.userData.id);
                    isFocus = (obj === targetEntity) || isConnected || isStacked;
                } else {
                    // エッジ（線分・矢印）を選択した際、両端の本体だけでなく上に乗っている要素（グルコース等）もフォーカス対象にする
                    const isConnectedNode = (targetEntity.node1 === obj || targetEntity.node2 === obj);
                    const isStackedOnNode1 = (obj.userData.semantic.stackedOn === targetEntity.node1.userData.id);
                    const isStackedOnNode2 = (obj.userData.semantic.stackedOn === targetEntity.node2.userData.id);
                    isFocus = isConnectedNode || isStackedOnNode1 || isStackedOnNode2;
                }
                obj.material.opacity = isFocus ? 1.0 : 0.15;
                if(obj.labelObject) {
                    if(isFocus) obj.labelObject.element.classList.remove('dimmed');
                    else obj.labelObject.element.classList.add('dimmed');
                }
            });

            linesData.forEach(ld => {
                const isFocus = (!isTargetNode && ld === targetEntity) || (isTargetNode && (ld.node1 === targetEntity || ld.node2 === targetEntity));
                ld.lineMesh.material.opacity = isFocus ? 1.0 : 0.15;
                if(ld.arrow1) ld.arrow1.material.opacity = isFocus ? 1.0 : 0.15;
                if(ld.arrow2) ld.arrow2.material.opacity = isFocus ? 1.0 : 0.15;
                if(ld.labelObject) {
                    if(isFocus) ld.labelObject.element.classList.remove('dimmed');
                    else ld.labelObject.element.classList.add('dimmed');
                }
                if(ld.crossObject) {
                    ld.crossObject.children.forEach(c => c.material.opacity = isFocus ? 1.0 : 0.15);
                }
            });
        }

        function resetFocus() {
            objects.forEach(obj => { obj.material.opacity = 1.0; if(obj.labelObject) obj.labelObject.element.classList.remove('dimmed'); });
            linesData.forEach(ld => {
                ld.lineMesh.material.opacity = 1.0; if(ld.arrow1) ld.arrow1.material.opacity = 1.0; if(ld.arrow2) ld.arrow2.material.opacity = 1.0;
                if(ld.labelObject) ld.labelObject.element.classList.remove('dimmed');
                if(ld.crossObject) ld.crossObject.children.forEach(c => c.material.opacity = 1.0);
            });
        }
        
        function getEntityById(id) {
            const node = objects.find(o => o.userData.id === id);
            if(node) return node;
            return linesData.find(ld => ld.id === id);
        }

        // ＝＝＝ ツアー制御ロジック ＝＝＝
        function updateTourUI() {
            const step = tourSteps[currentStep];
            document.getElementById('tour-title').innerText = step.title;
            document.getElementById('tour-desc').innerText = step.desc;
            document.getElementById('tour-counter').innerText = `${currentStep + 1} / ${tourSteps.length}`;
            
            document.getElementById('btn-prev').disabled = (currentStep === 0);
            document.getElementById('btn-next').disabled = (currentStep === tourSteps.length - 1);

            if (step.targetId) {
                const target = getEntityById(step.targetId);
                if(target) setFocus(target);
            } else {
                resetFocus();
                focusAllCamera();
            }
            
            // モバイルなどで説明文が長い場合に一番上までスクロールを戻す
            document.getElementById('tour-desc').scrollTop = 0;
        }

        function focusAllCamera() {
            if(objects.length === 0) return;
            const box = new THREE.Box3();
            objects.forEach(o => box.expandByObject(o));
            linesData.forEach(ld => { box.expandByObject(ld.lineMesh); });
            const center = new THREE.Vector3(); box.getCenter(center);
            const size = new THREE.Vector3(); box.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            const cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
            camera.position.set(center.x, center.y + maxDim/2, center.z + cameraZ * 1.5);
            controls.target.copy(center);
        }

        window.nextStep = function() {
            if (currentStep < tourSteps.length - 1) {
                currentStep++;
                updateTourUI();
            }
        };

        window.prevStep = function() {
            if (currentStep > 0) {
                currentStep--;
                updateTourUI();
            }
        };

        window.addEventListener('load', () => { 
            buildSpace(); 
            focusAllCamera();
            updateTourUI();
        });
        
        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            linesData.forEach(ld => { if(ld.crossObject && ld.crossObject.visible) ld.crossObject.lookAt(camera.position); });
            renderer.render(scene, camera); 
            cssRenderer.render(scene, camera); 
        }
        
        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
            cssRenderer.setSize(window.innerWidth, window.innerHeight); 
        });
        animate();
    </script>
